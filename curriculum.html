<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Curriculum — COLOURDIVE</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,450;0,9..144,600;1,9..144,450&family=Inter:wght@400;500;600&display=swap');
:root{
  --paper:#0B0A08; --paper-2:#17150F; --ink:#FFFFFF; --ink-soft:rgba(255,255,255,0.62);
  --line:rgba(255,255,255,0.14); --line-strong:rgba(255,255,255,0.32);
  --paper-rgb:11,10,8; --maxw:1180px; --accent:#D9C99A;
}
*{box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{margin:0;background:var(--paper);color:var(--ink);font-family:'Inter',-apple-system,sans-serif;-webkit-font-smoothing:antialiased;}
img{max-width:100%;display:block;}
a{color:inherit;text-decoration:none;}
.serif{font-family:'Fraunces',serif;}
.eyebrow{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-soft);display:inline-flex;align-items:center;gap:8px;border:1px solid var(--line-strong);border-radius:999px;padding:6px 14px;}

.site-header{position:sticky;top:0;z-index:40;background:rgba(var(--paper-rgb),.86);backdrop-filter:blur(10px);border-bottom:1px solid var(--line);}
.site-header-inner{max-width:var(--maxw);margin:0 auto;padding:26px 28px;display:flex;align-items:center;justify-content:space-between;gap:24px;}
.brand{font-family:'Fraunces',serif;font-size:20px;font-weight:600;letter-spacing:-.01em;white-space:nowrap;display:flex;flex-direction:column;align-items:flex-start;gap:4px;}
.brand-logo{height:48px;width:auto;display:block;}
.brand small{display:block;font-family:'Inter',sans-serif;font-weight:500;font-size:10px;letter-spacing:.16em;color:var(--ink-soft);text-transform:uppercase;margin-top:2px;}
.main-nav{display:flex;gap:4px;flex-wrap:wrap;justify-content:flex-end;}
.main-nav a{font-size:13px;padding:8px 12px;border-radius:999px;color:var(--ink-soft);white-space:nowrap;transition:background .15s ease,color .15s ease;}
.main-nav a:hover{background:rgba(20,19,15,.06);color:var(--ink);}

.hero{max-width:var(--maxw);margin:0 auto;padding:90px 28px 60px;border-bottom:1px solid var(--line);}
.hero-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:46px;flex-wrap:wrap;gap:12px;}
.hero h1{font-family:'Fraunces',serif;font-weight:450;font-style:italic;font-size:clamp(64px,12vw,168px);line-height:.86;margin:0;letter-spacing:-.01em;}
.hero .tags{margin-top:28px;display:flex;gap:10px;flex-wrap:wrap;font-size:12px;letter-spacing:.04em;color:var(--ink-soft);text-transform:uppercase;}
.hero .tags span{border:1px solid var(--line-strong);padding:5px 12px;border-radius:999px;}
.hero .signoff{margin-top:40px;display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:20px;}
.hero .signoff .name{font-family:'Fraunces',serif;font-size:22px;}
.hero .signoff .role{font-size:12px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.08em;}

.about-strip{max-width:var(--maxw);margin:0 auto;padding:100px 28px 110px;border-bottom:1px solid var(--line);}
.about-strip .col-label{font-size:13px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-soft);margin-bottom:28px;}
.about-header{display:flex;align-items:center;gap:24px;margin-bottom:44px;}
.profile-photo{width:96px;height:96px;border-radius:50%;overflow:hidden;flex-shrink:0;border:1px solid var(--line-strong);}
.profile-photo img{width:100%;height:100%;object-fit:cover;}
.about-header .who .name{font-family:'Fraunces',serif;font-size:24px;}
.about-header .who .role{font-size:12px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.08em;margin-top:4px;}
.about-text-grid{display:grid;grid-template-columns:1fr 1fr;gap:56px;}
@media (max-width:800px){.about-text-grid{grid-template-columns:1fr;}}
.about-strip .lede{font-family:'Fraunces',serif;font-size:clamp(26px,3.2vw,40px);line-height:1.45;margin:0;}
.about-strip .career-list{font-size:15px;color:var(--ink-soft);line-height:2.1;padding:0;margin:0;}
.about-strip .career-list li{list-style:none;}
.about-strip .mini-label{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-soft);margin:22px 0 8px;}
.about-strip .mini-label:first-child{margin-top:0;}
.career-list.compact{font-size:13px;line-height:1.85;}
.career-list.compact li{display:flex;justify-content:space-between;gap:12px;border-bottom:1px dashed var(--line);padding:3px 0;}
.career-list.compact li span{color:var(--ink-soft);white-space:nowrap;font-size:12px;}

.sections-grid{max-width:var(--maxw);margin:0 auto;padding:56px 28px 20px;}
.sections-grid .col-label{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-soft);margin-bottom:24px;}
.cat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:2px;background:var(--line);border:1px solid var(--line);}
@media (max-width:900px){.cat-grid{grid-template-columns:repeat(2,1fr);}}
@media (max-width:560px){.cat-grid{grid-template-columns:1fr;}}
.cat-card{position:relative;background:var(--paper);aspect-ratio:4/3.1;overflow:hidden;display:block;}
.cat-card img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transition:transform .6s cubic-bezier(.2,.8,.2,1);}
.cat-card:hover img{transform:scale(1.06);}
.cat-card::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(10,10,8,0) 40%,rgba(10,10,8,.78) 100%);}
.cat-card .cc-inner{position:absolute;left:0;right:0;bottom:0;padding:20px;z-index:2;color:#fff;}
.cat-card .cc-num{font-family:'Fraunces',serif;font-style:italic;font-size:12px;opacity:.8;}
.cat-card .cc-title{font-family:'Fraunces',serif;font-size:26px;margin:4px 0 6px;}
.cat-card .cc-sub{font-size:11px;letter-spacing:.06em;text-transform:uppercase;opacity:.75;}

.section-hero{max-width:var(--maxw);margin:0 auto;padding:64px 28px 40px;border-bottom:1px solid var(--line);scroll-margin-top:110px;}
.section-hero .index-no{font-family:'Fraunces',serif;font-style:italic;color:var(--ink-soft);font-size:14px;}
.section-hero h2{font-family:'Fraunces',serif;font-weight:450;font-size:clamp(40px,7vw,84px);line-height:.98;margin:10px 0 18px;letter-spacing:-.01em;}
.section-hero p{max-width:620px;color:var(--ink-soft);font-size:15px;line-height:1.7;}
.section-hero .meta-row{margin-top:28px;display:flex;gap:28px;flex-wrap:wrap;font-size:12px;color:var(--ink-soft);letter-spacing:.04em;text-transform:uppercase;}
.section-hero .meta-row b{color:var(--ink);font-weight:600;}

.gallery-wrap{max-width:var(--maxw);margin:0 auto;padding:40px 28px 60px;}
.project-group{margin-bottom:56px;}
.project-group-head{display:flex;align-items:baseline;gap:14px;margin-bottom:18px;padding-bottom:10px;border-bottom:1px solid var(--line);}
.project-group-head .pg-num{font-family:'Fraunces',serif;font-style:italic;font-size:15px;color:var(--ink-soft);}
.project-group-head h3{font-family:'Fraunces',serif;font-weight:500;font-size:22px;margin:0;}
.project-sub{margin:-6px 0 16px;color:var(--ink-soft);font-size:13px;}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
@media (max-width:900px){.grid{grid-template-columns:repeat(2,1fr);}}
@media (max-width:560px){.grid{grid-template-columns:1fr;}}
.thumb{position:relative;cursor:zoom-in;overflow:hidden;border-radius:3px;background:var(--paper-2);border:1px solid var(--line);aspect-ratio:8/5;}
.thumb img{width:100%;height:100%;object-fit:cover;transition:transform .5s cubic-bezier(.2,.8,.2,1);}
.thumb:hover img{transform:scale(1.045);}
.thumb .pnum{position:absolute;top:10px;left:10px;font-size:10px;letter-spacing:.08em;background:rgba(20,19,15,.72);color:var(--paper);padding:4px 8px;border-radius:999px;}

.lightbox{position:fixed;inset:0;background:rgba(10,10,8,.94);display:none;align-items:center;justify-content:center;z-index:100;padding:40px;}
.lightbox.open{display:flex;}
.lightbox img{max-width:100%;max-height:88vh;margin:0 auto;border-radius:2px;box-shadow:0 30px 80px rgba(0,0,0,.5);}
.lightbox .lb-close,.lightbox .lb-prev,.lightbox .lb-next{position:absolute;color:var(--paper);background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.2);width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;transition:background .15s ease;}
.lightbox .lb-close:hover,.lightbox .lb-prev:hover,.lightbox .lb-next:hover{background:rgba(255,255,255,.2);}
.lightbox .lb-close{top:24px;right:24px;} .lightbox .lb-prev{left:24px;top:50%;transform:translateY(-50%);} .lightbox .lb-next{right:24px;top:50%;transform:translateY(-50%);}
.lightbox .lb-caption{position:absolute;bottom:24px;left:0;right:0;text-align:center;color:rgba(255,255,255,.65);font-size:12px;letter-spacing:.06em;}
@media (max-width:640px){.lightbox{padding:16px;} .lightbox .lb-prev{left:8px;} .lightbox .lb-next{right:8px;} .lightbox .lb-close{top:12px;right:12px;}}

.product-section{max-width:var(--maxw);margin:0 auto;padding:90px 28px 40px;border-bottom:1px solid var(--line);scroll-margin-top:110px;}
.product-hero{display:grid;grid-template-columns:1fr 1fr;gap:56px;align-items:center;margin-bottom:60px;}
@media (max-width:800px){.product-hero{grid-template-columns:1fr;}}
.product-hero .shot{border:1px solid var(--line-strong);border-radius:6px;overflow:hidden;cursor:zoom-in;}
.product-hero .shot img{width:100%;display:block;transition:transform .5s cubic-bezier(.2,.8,.2,1);}
.product-hero .shot:hover img{transform:scale(1.03);}
.product-hero h2{font-family:'Fraunces',serif;font-weight:450;font-size:clamp(32px,4.4vw,52px);line-height:1.15;margin:14px 0 18px;}
.product-hero .p-tagline{font-size:15px;color:var(--ink-soft);line-height:1.8;margin-bottom:26px;}
.product-hero .p-meta{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:32px;}
.product-hero .p-meta span{font-size:11px;letter-spacing:.06em;text-transform:uppercase;border:1px solid var(--line-strong);border-radius:999px;padding:6px 12px;color:var(--ink-soft);}
.buy-btn{display:inline-flex;align-items:center;gap:10px;background:var(--ink);color:var(--paper);font-size:14px;font-weight:600;letter-spacing:.02em;padding:16px 28px;border-radius:999px;transition:opacity .15s ease;}
.buy-btn:hover{opacity:.85;}
.buy-btn.secondary{background:transparent;color:var(--ink);border:1px solid var(--line-strong);padding:15px 27px;}
.buy-row{display:flex;flex-wrap:wrap;gap:10px;}
.price-row{display:flex;align-items:baseline;gap:10px;margin-bottom:20px;}
.price-row .now{font-family:'Fraunces',serif;font-size:30px;}
.price-row .was{font-size:14px;color:var(--ink-soft);text-decoration:line-through;}
.price-row .off{font-size:12px;color:var(--ink);border:1px solid var(--line-strong);border-radius:999px;padding:3px 9px;}
.buy-note{margin-top:14px;font-size:12px;color:var(--ink-soft);}
.product-gallery{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;padding-bottom:20px;}
@media (max-width:900px){.product-gallery{grid-template-columns:repeat(2,1fr);}}
@media (max-width:560px){.product-gallery{grid-template-columns:1fr;}}

.site-footer{border-top:1px solid var(--line);padding:48px 28px 60px;}
.site-footer-inner{max-width:var(--maxw);margin:0 auto;display:flex;justify-content:space-between;flex-wrap:wrap;gap:24px;font-size:13px;color:var(--ink-soft);}
.site-footer .f-brand{font-family:'Fraunces',serif;font-size:18px;color:var(--ink);}
.site-footer a:hover{color:var(--ink);text-decoration:underline;}

a:focus-visible,button:focus-visible,.thumb:focus-visible{outline:2px solid var(--accent);outline-offset:2px;}
@media (prefers-reduced-motion:reduce){*{transition:none !important;scroll-behavior:auto !important;}}

</style>
</head>
